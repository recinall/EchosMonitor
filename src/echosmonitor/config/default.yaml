app:
  data_dir: null
  log_level: INFO
  log_json: false
  archive_root: null
ui:
  theme: dark
  default_window_seconds: 60
  refresh_hz: 20
  max_visible_plots: 8
  recent_detections_limit: 200
  max_display_rate_hz: 250
devices:
- name: echos
  host: echos.local
  port: 18000
  reconnect:
    initial_delay_s: 1.0
    max_delay_s: 60.0
    connect_timeout_s: 10.0
  selectors:
  - network: XX
    station: ECHOS
    location: '00'
    channel: HHE
  - network: XX
    station: ECHOS
    location: '00'
    channel: HHZ
  - network: XX
    station: ECHOS
    location: '00'
    channel: HHN
  dsp_chain: []
  archive:
    enabled: false
    format: mseed_sds
    root_dir: null
    encoding: STEIM2
    record_length: 512
    max_open_files: 32
    fsync_interval_s: 5.0
    queue_max: 1024
  response_metadata:
    path: null
    format: auto
    pre_filt: null
  echos:
    http_port: 80
    position_override: null
    poll_interval_s: 5.0
hvsr:
  enabled: false
  window_length_s: 60.0
  konno_ohmachi_b: 40.0
  freqmin_hz: 0.2
  freqmax_hz: 20.0
  horizontal_method: geometric_mean
  rejection_method: frequency_domain
  rejection_n: 2.0
  detrend: linear
  resample_n: 512
  psd_smoothing: true
  psd_konno_ohmachi_b: 40.0
