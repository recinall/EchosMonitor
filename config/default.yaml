app:
  data_dir: null            # null → platformdirs default
  log_level: INFO
  log_json: false
  # archive_root: null      # null → platformdirs user_data_dir / "archive"
  #                         # per-device archive.root_dir overrides this.

ui:
  theme: dark
  default_window_seconds: 60
  refresh_hz: 20
  max_visible_plots: 8
  max_display_rate_hz: 250  # display-only peak decimation cap (rule 11)

devices: []
# Echos nodes carry an additional `echos:` section — CLIENT-side settings
# only (rule 15: server-side config such as OSR, gains and the SeedLink
# ring lives on the device, managed via its REST API; the admin password
# lives in the OS keyring / fallback file, NEVER in this YAML):
#
# devices:
#   - name: echos-field-01
#     host: echos.local
#     port: 18000
#     echos:
#       http_port: 80
#       poll_interval_s: 5.0
#       # position_override: { lat: 45.4, lon: 11.9, elev_m: 20.0 }  # wins over StationXML (rule 16)
#
# Example: TWO public servers in parallel (best-effort, throttled — for
# smoke testing only). Each device has its own dsp_chain; the chain
# stages are tuned to the seismic context of the network so the live
# UI shows plausible filtered output instead of generic settings.
#
# devices:
#   - name: iris-iu-anmo
#     host: rtserve.iris.washington.edu
#     port: 18000
#     reconnect: { initial_delay_s: 1.0, max_delay_s: 60.0, connect_timeout_s: 10.0 }
#     selectors:
#       - { network: IU, station: ANMO, location: "00", channel: BHZ }
#     dsp_chain:
#       - { type: detrend, kind: constant }
#       - { type: bandpass, freqmin: 0.5, freqmax: 8.0, corners: 4, zerophase: false }
#       - { type: sta_lta, sta: 1.0, lta: 30.0, on_threshold: 3.5, off_threshold: 1.5 }
#     archive:
#       enabled: true
#       # root_dir: null    # null → app.archive_root → platformdirs default
#       encoding: STEIM2    # auto-falls-back to FLOAT32 for float-dtype streams
#       record_length: 512
#       fsync_interval_s: 5.0
#
#   - name: gfz-de
#     host: geofon.gfz-potsdam.de
#     port: 18000
#     reconnect: { initial_delay_s: 1.0, max_delay_s: 60.0, connect_timeout_s: 10.0 }
#     selectors:
#       - { network: GE, station: WLF, location: "", channel: BHZ }
#     dsp_chain:
#       - { type: detrend, kind: constant }
#       - { type: bandpass, freqmin: 0.5, freqmax: 8.0, corners: 4, zerophase: false }
#       - { type: sta_lta, sta: 1.0, lta: 30.0, on_threshold: 3.5, off_threshold: 1.5 }

hvsr:
  # HVSR (Nakamura H/V spectral ratio) analysis tab. Starting values the UI
  # seeds its controls from; the user changes them per measurement.
  enabled: false
  window_length_s: 60.0      # SESAME: resolves f0 > 10/lw (>= ~0.17 Hz here)
  konno_ohmachi_b: 40.0      # Konno-Ohmachi smoothing bandwidth (hvsrpy default)
  freqmin_hz: 0.2
  freqmax_hz: 20.0
  horizontal_method: geometric_mean   # how N/E combine into one horizontal
  rejection_method: frequency_domain  # Cox-2020 auto window rejection (or "none")
  rejection_n: 2.0           # Cox-2020 std multiplier (larger = more permissive)
  detrend: linear            # per-window detrend: linear or constant (mean)
  resample_n: 512            # log-spaced Konno-Ohmachi centre frequencies
  psd_smoothing: true        # Konno-Ohmachi smooth the 3-channel PSD display
  psd_konno_ohmachi_b: 40.0  # PSD smoothing bandwidth (diagnostic, own b)
