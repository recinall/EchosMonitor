# EchosMonitor release pipeline (M7-C2). On a pushed tag `v*`, build the
# per-OS desktop artifacts and publish them to the matching GitHub Release.
#
# `workflow_dispatch` builds the same artifacts WITHOUT cutting a release
# (they're downloadable from the run) so the pipeline can be validated before
# the first real tag. Only a `v*` tag runs the publish job.
#
# Artifacts (all named `EchosMonitor-<version>-...`):
#   Linux   -> AppImage
#   Windows -> Inno Setup installer (.exe) + portable .zip
#   macOS   -> .dmg
# Unsigned for now (signing is M7-D, wired later as optional secrets).
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Read-only by default; the publish job elevates to contents: write.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      # One OS failing should not abort the others — each artifact is
      # independent and worth seeing.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout (full history for hatch-vcs)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # The packaged `--check` smoke in scripts/build.sh constructs the main
      # window headless; on Linux the PySide6 offscreen plugin needs these.
      - name: Install Qt offscreen system libs (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libglib2.0-0

      # Version = semver tag + short commit SHA (e.g. v0.1.1 @ 29d5250 ->
      # 0.1.1+g29d5250), so every release artifact is traceable to its exact
      # commit. SETUPTOOLS_SCM_PRETEND_VERSION (exported job-wide BEFORE the
      # build) makes hatch-vcs emit exactly this into __version__ + the package
      # metadata; a clean tag would otherwise drop the local +g<sha> segment.
      # On workflow_dispatch (no tag) it is left unset → the natural dev
      # version (0.1.devN+g<sha>) which already carries the SHA.
      - name: Pin version to <tag>+g<sha> (tag builds)
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          base="${GITHUB_REF_NAME#v}"
          sha="$(git rev-parse --short=7 HEAD)"
          echo "SETUPTOOLS_SCM_PRETEND_VERSION=${base}+g${sha}" >> "$GITHUB_ENV"
          echo "version pinned to ${base}+g${sha}"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          version: "0.11.21"
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies (uv sync --locked)
        run: uv sync --locked

      - name: Resolve version (from git tag via hatch-vcs)
        id: ver
        shell: bash
        run: echo "version=$(uv run python -c 'import echosmonitor; print(echosmonitor.__version__)')" >> "$GITHUB_OUTPUT"

      - name: Build PyInstaller bundle (Linux / macOS)
        if: runner.os != 'Windows'
        run: ./scripts/build.sh

      - name: Build PyInstaller bundle (Windows)
        if: runner.os == 'Windows'
        run: powershell -ExecutionPolicy Bypass -File scripts/build.ps1

      - name: Package AppImage (Linux)
        if: runner.os == 'Linux'
        run: packaging/linux/build_appimage.sh "${{ steps.ver.outputs.version }}"

      - name: Package installer + portable zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "/DMyAppVersion=${{ steps.ver.outputs.version }}" packaging\windows\echosmonitor.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed ($LASTEXITCODE)" }
          Compress-Archive -Path dist\echosmonitor -DestinationPath "dist\EchosMonitor-${{ steps.ver.outputs.version }}-windows-portable.zip" -Force

      - name: Package dmg (macOS)
        if: runner.os == 'macOS'
        run: packaging/macos/build_dmg.sh "${{ steps.ver.outputs.version }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          # Every packaged artifact is named `EchosMonitor-<version>-...`; the
          # raw one-dir bundle (`dist/echosmonitor/`, lowercase) is excluded.
          path: dist/EchosMonitor-*
          if-no-files-found: error

  publish:
    name: publish GitHub Release
    needs: build
    # Only a real tag cuts a release; workflow_dispatch stops after build.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: false
          # A tag with a hyphen (v0.1.0-rc1) is a pre-release.
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          fail_on_unmatched_files: true
